<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fish Demo — John Hanacek Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #020a12;
      --text: #d4dce8;
      --heading: #e8eff8;
      --accent: #4a9eed;
      --dim: #5a7090;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
    }

    #page {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: none;
      touch-action: none;
    }

    .text-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .text-line {
      position: absolute;
      white-space: nowrap;
      pointer-events: none;
      will-change: transform;
    }

    .word {
      cursor: pointer;
      pointer-events: auto;
      transition: color 0.15s ease, text-shadow 0.15s ease;
      border-radius: 2px;
    }

    .word:hover {
      color: var(--accent) !important;
      text-shadow: 0 0 8px rgba(74, 158, 237, 0.3);
    }

    .header-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 24px 10px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(2, 10, 18, 0.95), transparent);
    }

    .header-bar h1 {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .header-bar h1 span {
      color: var(--dim);
      font-weight: 300;
      font-size: 12px;
    }

    .header-bar a {
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      border: 1px solid rgba(74, 158, 237, 0.2);
      padding: 4px 12px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .header-bar a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    #drawHint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(2, 10, 18, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(74, 158, 237, 0.2);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: var(--dim);
      transition: opacity 0.4s ease;
      pointer-events: none;
      max-width: 320px;
      text-align: center;
    }

    #drawHint .hint-title {
      color: var(--accent);
      font-weight: 500;
      font-size: 13px;
    }

    #drawHint .hint-row {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    #drawHint .hint-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #drawHint .hint-icon {
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .text-line { font-size: 15px !important; }
      .header-bar { padding: 10px 16px 8px; }
      .header-bar h1 { font-size: 14px; }
      #drawHint { bottom: 16px; font-size: 11px; padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <div id="page">
    <div class="text-layer" id="textLayer"></div>
    <canvas id="heroCanvas"></canvas>
    <div class="header-bar">
      <h1>John Hanacek <span>· design</span></h1>
      <a href="https://johnhanacek.com/design.html">full portfolio →</a>
    </div>
    <div id="drawHint">
      <div class="hint-title">Draw & Interact</div>
      <div class="hint-row">
        <div class="hint-item"><span class="hint-icon">〰️</span> draw a loop → fish</div>
      </div>
      <div class="hint-row">
        <div class="hint-item"><span class="hint-icon">👆</span> tap a word → fish eats it</div>
      </div>
    </div>
  </div>
  <script type="module" src="fish.js"></script>
</body>
</html>
