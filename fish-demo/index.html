<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Demo — John Hanacek Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a1628;
      --text: #d4dce8;
      --heading: #e8eff8;
      --accent: #4a9eed;
      --accent2: #38d9a9;
      --dim: #5a7090;
      --fish1: #4a9eed;
      --fish2: #38d9a9;
      --fish3: #f59f00;
      --fish4: #e64980;
      --fish5: #7c3aed;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
    }

    #page {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }

    .text-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .text-line {
      position: absolute;
      white-space: nowrap;
      pointer-events: none;
      will-change: transform;
      transition: none;
    }

    .fish-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .fish {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      z-index: 3;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      transition: filter 0.2s ease;
    }

    .fish:hover {
      filter: drop-shadow(0 4px 16px rgba(74, 158, 237, 0.4));
    }

    .fish svg {
      width: 100%;
      height: 100%;
    }

    /* Subtle water caustics overlay */
    .caustics {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.03;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(74, 158, 237, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(56, 217, 169, 0.4) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(74, 158, 237, 0.3) 0%, transparent 45%);
    }

    /* Bubbles */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), rgba(74,158,237,0.05));
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      z-index: 4;
    }

    .header-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 24px 10px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(10, 22, 40, 0.95), transparent);
    }

    .header-bar h1 {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .header-bar h1 span {
      color: var(--dim);
      font-weight: 300;
      font-size: 12px;
    }

    .header-bar a {
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      border: 1px solid rgba(74, 158, 237, 0.2);
      padding: 4px 12px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .header-bar a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    @media (max-width: 600px) {
      .text-line { font-size: 15px !important; }
      .header-bar { padding: 10px 16px 8px; }
      .header-bar h1 { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="page">
    <div class="caustics"></div>
    <div class="text-layer" id="textLayer"></div>
    <div class="fish-layer" id="fishLayer"></div>
    <div class="header-bar">
      <h1>John Hanacek <span>· design</span></h1>
      <a href="https://johnhanacek.com/design.html">full portfolio →</a>
    </div>
  </div>
  <script type="module" src="fish.js"></script>
</body>
</html>
